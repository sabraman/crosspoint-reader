<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="/favicon.ico" sizes="any" />
  <script>
    try {
      document.documentElement.dataset.theme = localStorage.getItem('crosspoint-theme') || 'dark';
    } catch (e) {
      document.documentElement.dataset.theme = 'dark';
    }
  </script>
  <title>Settings - CrossPoint Reader</title>
  <style>
    .card {
      margin: 28px 0 0;
      padding: 0;
      background: transparent;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }
    .card h2 {
      margin: 0 0 18px;
    }
    .setting-row {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(118px, 38%) minmax(0, 1fr);
      gap: 14px;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }
    .setting-row.setting-type-string {
      grid-template-columns: 1fr;
      align-items: stretch;
    }
    .setting-row.setting-type-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    .setting-row.setting-type-toggle .setting-control {
      width: auto;
      flex: 0 0 auto;
    }
    .setting-name {
      color: var(--foreground);
      font-size: 16px;
      line-height: 1.25;
      font-weight: 650;
      overflow-wrap: anywhere;
    }
    .setting-control {
      width: 100%;
    }
    .setting-control select,
    .setting-control input[type="text"],
    .setting-control input[type="password"] {
      width: 100%;
    }
    .number-stepper {
      width: 100%;
      min-height: var(--ui-control-h);
      display: grid;
      grid-template-columns: var(--ui-control-h) 1fr var(--ui-control-h);
      align-items: center;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      background: var(--background);
    }
    .number-stepper button,
    .number-stepper input[type="number"] {
      height: var(--ui-control-h);
      min-height: var(--ui-control-h);
      border: 0;
      border-radius: 0;
      background: transparent;
      color: var(--foreground);
    }
    .number-stepper button {
      cursor: pointer;
      font-size: 24px;
      line-height: 1;
    }
    .number-stepper button:hover {
      background: var(--surface-elevated);
    }
    .number-stepper input[type="number"] {
      width: 100%;
      text-align: center;
      font-size: 20px;
      font-weight: 500;
      -moz-appearance: textfield;
    }
    .number-stepper input::-webkit-outer-spin-button,
    .number-stepper input::-webkit-inner-spin-button {
      margin: 0;
      -webkit-appearance: none;
    }
    .save-container {
      margin: 18px 0;
    }
    .save-btn,
    .opds-actions .btn-small,
    .add-action .btn-small {
      width: 100%;
    }
    .opds-server {
      margin: 18px 0 0;
      padding: 18px 0 0;
      border-top: 1px solid var(--border);
      background: transparent;
    }
    .opds-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 14px;
    }
    .opds-actions .btn-small:only-child {
      grid-column: 1 / -1;
    }
    .add-action {
      display: block;
      margin-top: 14px;
    }
    .message {
      display: none;
      margin: 18px 0 0;
      padding: 12px 14px;
    }
    .message.success,
    .message.error {
      display: block;
    }
    .modal h3 {
      margin: 0 0 10px;
      font-size: 20px;
    }
    .file-info {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.45;
    }
    .loader-container {
      display: flex;
      justify-content: center;
      padding: 34px 0;
    }
    .loader {
      width: 28px;
      height: 28px;
      border: 3px solid var(--foreground);
      border-bottom-color: transparent;
      border-radius: 999px;
      display: inline-block;
      animation: rotation 1s linear infinite;
    }
    @keyframes rotation {
      to { transform: rotate(360deg); }
    }
  </style>
  <link rel="stylesheet" href="/app.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="brand-mark" aria-hidden="true">
        <svg class="brand-logo" viewBox="0 0 162 180" aria-hidden="true"><path d="M141.133 1.93774C150.102 -3.44192 161.517 3.01665 161.521 13.4749V166.526C161.517 176.984 150.102 183.442 141.133 178.063L80.7588 141.837L20.3867 178.063C11.4176 183.442 0.00328866 176.984 0 166.526V13.4749C0.00337257 3.01685 11.4176 -3.44137 20.3867 1.93774L80.7598 38.1614L141.133 1.93774ZM121.275 117.524L92.3848 134.864L147.281 167.811C148.277 168.408 149.542 167.685 149.545 166.526V100.567L121.275 117.524ZM14.2393 12.1897C13.2438 11.5924 11.979 12.3152 11.9756 13.4749V86.6125L74.7725 124.29V48.51L14.2393 12.1897Z"></path></svg>
      </span>
      <div>
        <h1>CrossPoint</h1>
      </div>
    </div>
    <nav class="nav-links" aria-label="Primary navigation">
      <a href="/"><svg viewBox="0 0 24 24"><path d="M15 21v-8a1 1 0 0 0-1-1h-4a1 1 0 0 0-1 1v8"></path><path d="M3 10a2 2 0 0 1 .71-1.53l7-6a2 2 0 0 1 2.58 0l7 6A2 2 0 0 1 21 10v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>Home</a>
      <a href="/files"><svg viewBox="0 0 24 24"><path d="M20 20a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.69-.9L9.6 3.9A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13a2 2 0 0 0 2 2Z"></path></svg>Files</a>
      <a href="/settings" class="active"><svg viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.38a2 2 0 0 0-.73-2.73l-.15-.09a2 2 0 0 1-1-1.74v-.51a2 2 0 0 1 1-1.72l.15-.1a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>Settings</a>
      <a href="/fonts"><svg viewBox="0 0 24 24"><path d="M4 7V4h16v3"></path><path d="M9 20h6"></path><path d="M12 4v16"></path></svg>Fonts</a>
    </nav>
    <button class="theme-toggle" type="button" onclick="toggleTheme()" aria-label="Toggle theme" title="Toggle theme">
      <svg class="theme-icon-dark" viewBox="0 0 24 24"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
      <svg class="theme-icon-light" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>
    </button>
  </header>

  <div id="message" class="message"></div>

  <div id="settings-container">
    <div class="loader-container">
      <span class="loader"></span>
    </div>
  </div>

  <div class="save-container" id="save-container" style="display:none;">
    <button class="save-btn" id="saveBtn" onclick="saveSettings()">Save Settings</button>
  </div>

  <div id="wifi-container"></div>
  <div id="opds-container"></div>

  <p class="footer">CrossPoint E-Reader • <a href="https://github.com/crosspoint-reader/crosspoint-reader" rel="noopener noreferrer" target="_blank">Open Source</a></p>

<script>
  function applyTheme(theme) {
    document.documentElement.dataset.theme = theme;
    try { localStorage.setItem('crosspoint-theme', theme); } catch (e) {}
    document.querySelectorAll('.theme-icon-dark').forEach(function(icon) {
      icon.style.display = theme === 'dark' ? '' : 'none';
    });
    document.querySelectorAll('.theme-icon-light').forEach(function(icon) {
      icon.style.display = theme === 'light' ? '' : 'none';
    });
  }
  function toggleTheme() {
    applyTheme(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light');
  }
  function readStoredTheme() {
    try { return localStorage.getItem('crosspoint-theme') || 'dark'; } catch (e) { return 'dark'; }
  }
  applyTheme(readStoredTheme());

  let allSettings = [];
  let originalValues = {};

  function escapeHtml(unsafe) {
    return String(unsafe)
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function showMessage(text, isError) {
    const msg = document.getElementById('message');
    msg.textContent = text;
    msg.className = 'message ' + (isError ? 'error' : 'success');
    msg.style.display = 'block';
    setTimeout(function() { msg.style.display = 'none'; }, 4000);
  }

  function askConfirmation(message) {
    return new Promise(function(resolve) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay open';
      overlay.innerHTML =
        '<div class="modal" role="dialog" aria-modal="true" tabindex="-1">' +
          '<h3>Confirm action</h3>' +
          '<p class="file-info">' + escapeHtml(message) + '</p>' +
          '<div class="opds-actions">' +
            '<button class="btn-small btn-delete" data-action="confirm">Delete</button>' +
            '<button class="btn-small" data-action="cancel">Cancel</button>' +
          '</div>' +
        '</div>';
      const previousFocus = document.activeElement;
      document.body.appendChild(overlay);
      const modal = overlay.querySelector('.modal');
      modal.focus();

      function close(value) {
        document.removeEventListener('keydown', onKeyDown);
        overlay.remove();
        if (previousFocus && previousFocus.focus) previousFocus.focus();
        resolve(value);
      }

      function onKeyDown(event) {
        if (event.key === 'Escape') close(false);
      }

      overlay.addEventListener('click', function(event) {
        if (event.target === overlay) close(false);
        const action = event.target && event.target.getAttribute && event.target.getAttribute('data-action');
        if (action === 'confirm') close(true);
        if (action === 'cancel') close(false);
      });
      document.addEventListener('keydown', onKeyDown);
    });
  }

  function renderControl(setting) {
    const id = 'setting-' + setting.key;

    if (setting.type === 'toggle') {
      const checked = setting.value ? 'checked' : '';
      return '<label class="toggle-switch">' +
        '<input type="checkbox" id="' + id + '" ' + checked + ' onchange="markChanged()">' +
        '<span class="toggle-slider"></span></label>';
    }

    if (setting.type === 'enum') {
      let html = '<select id="' + id + '" onchange="markChanged()">';
      setting.options.forEach(function(opt, idx) {
        const selected = idx === setting.value ? ' selected' : '';
        const label = typeof opt === 'object' && opt !== null ? (opt.label || opt.name || opt.value || idx) : opt;
        html += '<option value="' + idx + '"' + selected + '>' + escapeHtml(label) + '</option>';
      });
      html += '</select>';
      return html;
    }

    if (setting.type === 'value') {
      return '<div class="number-stepper">' +
        '<button type="button" onclick="adjustNumber(this.nextElementSibling.id, -1)" aria-label="Decrease">-</button>' +
        '<input type="number" id="' + id + '" value="' + setting.value + '"' +
        ' min="' + setting.min + '" max="' + setting.max + '" step="' + setting.step + '"' +
        ' onchange="markChanged()">' +
        '<button type="button" onclick="adjustNumber(this.previousElementSibling.id, 1)" aria-label="Increase">+</button>' +
        '</div>';
    }

    if (setting.type === 'string') {
      const inputType = setting.name.toLowerCase().includes('password') ? 'password' : 'text';
      const val = setting.value || '';
      return '<input type="' + inputType + '" id="' + id + '" value="' + escapeHtml(val) + '"' +
        ' oninput="markChanged()">';
    }

    return '';
  }

  function getValue(setting) {
    const el = document.getElementById('setting-' + setting.key);
    if (!el) return undefined;

    if (setting.type === 'toggle') {
      return el.checked ? 1 : 0;
    }
    if (setting.type === 'enum') {
      return parseInt(el.value, 10);
    }
    if (setting.type === 'value') {
      return parseInt(el.value, 10);
    }
    if (setting.type === 'string') {
      return el.value;
    }
    return undefined;
  }

  function markChanged() {
    document.getElementById('saveBtn').disabled = false;
  }

  function adjustNumber(id, direction) {
    const input = document.getElementById(id);
    if (!input) return;
    const step = parseInt(input.step || '1', 10) || 1;
    const min = input.min === '' ? -Infinity : parseInt(input.min, 10);
    const max = input.max === '' ? Infinity : parseInt(input.max, 10);
    const current = parseInt(input.value || '0', 10) || 0;
    input.value = Math.max(min, Math.min(max, current + direction * step));
    markChanged();
  }

  async function loadSettings() {
    try {
      const response = await fetch('/api/settings');
      if (!response.ok) {
        throw new Error('Failed to load settings: ' + response.status);
      }
      allSettings = await response.json();

      // Store original values
      originalValues = {};
      allSettings.forEach(function(s) {
        originalValues[s.key] = s.value;
      });

      // Group by category
      const groups = {};
      allSettings.forEach(function(s) {
        if (!groups[s.category]) groups[s.category] = [];
        groups[s.category].push(s);
      });

      const container = document.getElementById('settings-container');
      let html = '';

      for (const category in groups) {
        html += '<div class="card"><h2>' + escapeHtml(category) + '</h2>';
        groups[category].forEach(function(s) {
          html += '<div class="setting-row setting-type-' + escapeHtml(s.type) + '">' +
            '<span class="setting-name">' + escapeHtml(s.name) + '</span>' +
            '<span class="setting-control">' + renderControl(s) + '</span>' +
            '</div>';
        });
        html += '</div>';
      }

      container.innerHTML = html;
      document.getElementById('save-container').style.display = '';
      document.getElementById('saveBtn').disabled = true;
    } catch (e) {
      console.error(e);
      document.getElementById('settings-container').innerHTML =
        '<div class="card"><p style="text-align:center;color:#e74c3c;">Failed to load settings</p></div>';
    }
  }

  async function saveSettings() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.textContent = 'Saving...';

    // Collect only changed values
    const changes = {};
    allSettings.forEach(function(s) {
      const current = getValue(s);
      if (current !== undefined && current !== originalValues[s.key]) {
        changes[s.key] = current;
      }
    });

    if (Object.keys(changes).length === 0) {
      showMessage('No changes to save.', false);
      btn.textContent = 'Save Settings';
      return;
    }

    try {
      const response = await fetch('/api/settings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(changes)
      });

      if (!response.ok) {
        const text = await response.text();
        throw new Error(text || 'Save failed');
      }

      // Update original values to new values
      for (const key in changes) {
        originalValues[key] = changes[key];
      }

      showMessage('Settings saved successfully!', false);
    } catch (e) {
      console.error(e);
      showMessage('Error: ' + e.message, true);
    }

    btn.textContent = 'Save Settings';
  }

  loadSettings();

  // --- Wi-Fi Network Management ---
  // Renders an editable list of saved Wi-Fi networks using /api/wifi endpoints.
  // Password fields are never pre-filled; when left blank during edit, existing
  // passwords remain unchanged server-side.
  let wifiNetworks = [];

  function renderWifiNetwork(net, idx) {
    const isNew = idx === -1;
    const id = isNew ? 'new' : idx;
    const lastConnected = net.isLastConnected
      ? '<div style="margin-top:8px;color:var(--label-color);font-size:0.9em;">Last connected network</div>'
      : '';

    return '<div class="opds-server" id="wifi-' + id + '">' +
      '<div class="setting-row">' +
        '<span class="setting-name">SSID</span>' +
        '<span class="setting-control"><input type="text" id="wifi-ssid-' + id + '" value="' + escapeHtml(net.ssid || '') + '"></span>' +
      '</div>' +
      '<div class="setting-row">' +
        '<span class="setting-name">Password</span>' +
        '<span class="setting-control"><input type="password" id="wifi-pass-' + id + '" placeholder="' + (net.hasPassword ? '(unchanged)' : '') + '"></span>' +
      '</div>' +
      lastConnected +
      '<div class="opds-actions">' +
        '<button class="btn-small btn-save-server" onclick="saveWifiNetwork(' + idx + ')">Save</button>' +
        (isNew ? '' : '<button class="btn-small btn-delete" onclick="deleteWifiNetwork(' + idx + ')">Delete</button>') +
      '</div>' +
    '</div>';
  }

  function renderWifiSection() {
    const container = document.getElementById('wifi-container');
    let html = '<div class="card"><h2>Wi-Fi Networks</h2>';

    if (wifiNetworks.length === 0) {
      html += '<p style="color:var(--label-color);text-align:center;">No Wi-Fi networks saved</p>';
    } else {
      wifiNetworks.forEach(function(net, idx) {
        html += renderWifiNetwork(net, idx);
      });
    }

    html += '<div class="add-action">' +
      '<button class="btn-small btn-add" onclick="addWifiNetwork()">Add Network</button>' +
    '</div></div>';
    container.innerHTML = html;
  }

  async function loadWifiNetworks() {
    try {
      const resp = await fetch('/api/wifi');
      if (!resp.ok) throw new Error('Failed to load');
      wifiNetworks = await resp.json();
      renderWifiSection();
    } catch (e) {
      console.error('Wi-Fi load error:', e);
    }
  }

  function addWifiNetwork() {
    const container = document.getElementById('wifi-container');
    const card = container.querySelector('.card');
    const addBtn = card.querySelector('.btn-add').parentElement;
    // Prevent multiple unsaved new-network forms at once (idx -1 -> id "new")
    if (document.getElementById('wifi-new')) return;
    addBtn.insertAdjacentHTML('beforebegin', renderWifiNetwork({ssid:'',hasPassword:false,isLastConnected:false}, -1));
  }

  async function saveWifiNetwork(idx) {
    const id = idx === -1 ? 'new' : idx;
    const ssid = document.getElementById('wifi-ssid-' + id).value.trim();
    if (!ssid) {
      showMessage('SSID is required.', true);
      return;
    }

    const data = { ssid: ssid };
    // Only include password when the user actually typed something; omitting it
    // tells the server to preserve an existing password.
    const pass = document.getElementById('wifi-pass-' + id).value;
    if (pass) data.password = pass;
    if (idx >= 0) data.index = idx;

    try {
      const resp = await fetch('/api/wifi', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      if (!resp.ok) throw new Error(await resp.text());
      showMessage('Wi-Fi network saved!', false);
      await loadWifiNetworks();
    } catch (e) {
      showMessage('Error: ' + e.message, true);
    }
  }

  async function deleteWifiNetwork(idx) {
    if (!await askConfirmation('Delete this Wi-Fi network?')) return;
    try {
      const resp = await fetch('/api/wifi/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({index: idx})
      });
      if (!resp.ok) throw new Error(await resp.text());
      showMessage('Wi-Fi network deleted', false);
      await loadWifiNetworks();
    } catch (e) {
      showMessage('Error: ' + e.message, true);
    }
  }

  // --- OPDS Server Management ---
  // Dynamically renders an editable list of OPDS servers, communicating with the
  // /api/opds REST endpoints. Password fields are never pre-filled for security;
  // the "(unchanged)" placeholder indicates an existing password is preserved on save.
  let opdsServers = [];

  function renderOpdsServer(srv, idx) {
    const isNew = idx === -1;
    const id = isNew ? 'new' : idx;
    return '<div class="opds-server" id="opds-' + id + '">' +
      '<div class="setting-row">' +
        '<span class="setting-name">Server Name</span>' +
        '<span class="setting-control"><input type="text" id="opds-name-' + id + '" value="' + escapeHtml(srv.name || '') + '"></span>' +
      '</div>' +
      '<div class="setting-row">' +
        '<span class="setting-name">URL</span>' +
        '<span class="setting-control"><input type="text" id="opds-url-' + id + '" value="' + escapeHtml(srv.url || '') + '"></span>' +
      '</div>' +
      '<div class="setting-row">' +
        '<span class="setting-name">Username</span>' +
        '<span class="setting-control"><input type="text" id="opds-user-' + id + '" value="' + escapeHtml(srv.username || '') + '"></span>' +
      '</div>' +
      '<div class="setting-row">' +
        '<span class="setting-name">Password</span>' +
        '<span class="setting-control"><input type="password" id="opds-pass-' + id + '" placeholder="' + (srv.hasPassword ? '(unchanged)' : '') + '"></span>' +
      '</div>' +
      '<div class="opds-actions">' +
        '<button class="btn-small btn-save-server" onclick="saveOpdsServer(' + idx + ')">Save</button>' +
        (isNew ? '' : '<button class="btn-small btn-delete" onclick="deleteOpdsServer(' + idx + ')">Delete</button>') +
      '</div>' +
    '</div>';
  }

  function renderOpdsSection() {
    const container = document.getElementById('opds-container');
    let html = '<div class="card"><h2>OPDS Servers</h2>';

    if (opdsServers.length === 0) {
      html += '<p style="color:var(--label-color);text-align:center;">No OPDS servers configured</p>';
    } else {
      opdsServers.forEach(function(srv, idx) {
        html += renderOpdsServer(srv, idx);
      });
    }

    html += '<div class="add-action">' +
      '<button class="btn-small btn-add" onclick="addOpdsServer()">Add Server</button>' +
    '</div></div>';
    container.innerHTML = html;
  }

  async function loadOpdsServers() {
    try {
      const resp = await fetch('/api/opds');
      if (!resp.ok) throw new Error('Failed to load');
      opdsServers = await resp.json();
      renderOpdsSection();
    } catch (e) {
      console.error('OPDS load error:', e);
    }
  }

  function addOpdsServer() {
    const container = document.getElementById('opds-container');
    const card = container.querySelector('.card');
    const addBtn = card.querySelector('.btn-add').parentElement;
    // Prevent multiple unsaved new-server forms at once (idx -1 -> id "new")
    if (document.getElementById('opds-new')) return;
    addBtn.insertAdjacentHTML('beforebegin', renderOpdsServer({name:'',url:'',username:'',hasPassword:false}, -1));
  }

  async function saveOpdsServer(idx) {
    const id = idx === -1 ? 'new' : idx;
    const data = {
      name: document.getElementById('opds-name-' + id).value,
      url: document.getElementById('opds-url-' + id).value,
      username: document.getElementById('opds-user-' + id).value,
    };
    // Only include password in payload when the user actually typed something;
    // omitting it tells the server to keep the existing password.
    const pass = document.getElementById('opds-pass-' + id).value;
    if (pass) data.password = pass;
    if (idx >= 0) data.index = idx;

    try {
      const resp = await fetch('/api/opds', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
      });
      if (!resp.ok) throw new Error(await resp.text());
      showMessage('OPDS server saved!', false);
      await loadOpdsServers();
    } catch (e) {
      showMessage('Error: ' + e.message, true);
    }
  }

  async function deleteOpdsServer(idx) {
    if (!await askConfirmation('Delete this OPDS server?')) return;
    try {
      const resp = await fetch('/api/opds/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({index: idx})
      });
      if (!resp.ok) throw new Error(await resp.text());
      showMessage('OPDS server deleted', false);
      await loadOpdsServers();
    } catch (e) {
      showMessage('Error: ' + e.message, true);
    }
  }

  loadWifiNetworks();
  loadOpdsServers();
</script>
</body>
</html>
